name: Release to PyPI

# Publishing is one tag away: `git tag v1.0.0 && git push --tags`.
# Builds the Rust micro-kernel wheels for Linux/macOS/Windows across CPython
# versions (maturin) + the pure-Python `bioma` package, then publishes both to
# PyPI via Trusted Publishing (OIDC — no stored token needed; configure the
# publisher for both `bioma` and `bioma_micro` at pypi.org first).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---- Rust micro-kernel: one wheel per OS × CPython -------------------------
  kernel-wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # abi3 (pyo3/abi3-py38 in Cargo/pyproject): ONE cp38-abi3 wheel per OS covers
          # CPython >= 3.8 — no per-interpreter list (which breaks on Windows without
          # PyO3's generate-import-lib).
          args: --release --out dist
          working-directory: bioma_micro
      - uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.os }}
          path: bioma_micro/dist/*.whl

  kernel-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with: { command: sdist, args: --out dist, working-directory: bioma_micro }
      - uses: actions/upload-artifact@v4
        with: { name: kernel-sdist, path: bioma_micro/dist/*.tar.gz }

  # ---- pure-Python bioma package -------------------------------------------
  bioma-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install build && python -m build --outdir dist
      - uses: actions/upload-artifact@v4
        with: { name: bioma-dist, path: dist/* }

  # ---- LangChain integration (pure Python) ---------------------------------
  langchain-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install build && python -m build --outdir dist integrations/bioma-langchain
      - uses: actions/upload-artifact@v4
        with: { name: langchain-dist, path: dist/* }

  # ---- Suite meta-package (pure Python) ------------------------------------
  suite-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install build && python -m build --outdir dist bioma_suite
      - uses: actions/upload-artifact@v4
        with: { name: suite-dist, path: dist/* }

  # ---- publish to PyPI — one job per project, DISTINCT environments --------
  # PyPI pending publishers are unique on (owner, repo, workflow, environment)
  # (warehouse#16920): separate environments let each project have its own
  # unambiguous Trusted Publishing identity.
  publish-micro:
    needs: [kernel-wheels, kernel-sdist, bioma-dist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { path: staged }
      - name: Collect bioma_micro artifacts
        run: mkdir -p dist-kernel && find staged -path '*kernel*' -name '*.whl' -o -path '*kernel*' -name '*.tar.gz' | xargs -I{} cp {} dist-kernel/
      - name: Publish bioma_micro
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist-kernel, skip-existing: true }

  publish-langchain:
    needs: [langchain-dist]
    runs-on: ubuntu-latest
    environment: pypi-langchain
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { path: staged }
      - name: Collect bioma-langchain artifacts
        run: mkdir -p dist-langchain && cp staged/langchain-dist/* dist-langchain/
      - name: Publish bioma-langchain
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist-langchain, skip-existing: true }

  publish-framework:
    needs: [kernel-wheels, kernel-sdist, bioma-dist]
    runs-on: ubuntu-latest
    environment: pypi-framework
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { path: staged }
      - name: Collect bioma artifacts
        run: mkdir -p dist-bioma && cp staged/bioma-dist/* dist-bioma/
      - name: Publish bioma-framework
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist-bioma, skip-existing: true }

  publish-suite:
    # After the components: the meta-package must never land on PyPI before the
    # versions it pins are resolvable.
    needs: [suite-dist, publish-micro, publish-framework, publish-langchain]
    runs-on: ubuntu-latest
    environment: pypi-suite
    permissions:
      id-token: write   # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { path: staged }
      - name: Collect bioma-suite artifacts
        run: mkdir -p dist-suite && cp staged/suite-dist/* dist-suite/
      - name: Publish bioma-suite
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist-suite, skip-existing: true }
