name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (kernel)
        working-directory: bioma_kernel
        run: cargo check --all-targets

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the Rust kernel (PyO3)
        run: |
          python -m pip install --upgrade pip maturin
          pip install ./bioma_kernel
      - name: Install orchestrator deps
        run: pip install httpx "openai>=1" python-dotenv pytest
      - name: Run orchestrator + context tests
        env:
          OMP_NUM_THREADS: "1"
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: python -m pytest bioma_orchestrator/tests -q

      # The full sovereign-engine suite needs the scientific stack (torch CPU +
      # scipy + networkx + hypothesis). Enable it once you're happy with CI time:
      # - name: Sovereign engine suite
      #   run: |
      #     pip install torch --index-url https://download.pytorch.org/whl/cpu
      #     pip install -r bioma_engine/requirements.txt
      #     python -m pytest bioma_engine/tests -q

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Proves the production image builds — the Rust/PyO3 kernel stage in a clean
      # Linux container (the runtime stage adds torch via a routine pip install).
      - name: Build kernel image stage
        run: docker build --target build -t bioma-kernel:ci .
