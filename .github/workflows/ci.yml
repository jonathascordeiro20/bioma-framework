name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (micro-kernel — lean core)
        working-directory: bioma_micro
        run: cargo check --all-targets
      - name: cargo check (kernel — resilience bench)
        working-directory: bioma_kernel
        run: cargo check --all-targets

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the lean micro-kernel (PyO3)
        run: |
          python -m pip install --upgrade pip maturin
          pip install ./bioma_micro
      - name: Smoke-test the kernel (hormonal bus + apoptosis)
        run: |
          python - <<'PY'
          import bioma_micro as k
          bus = k.HormonalBus(32); bus.secrete(0x0F, 0.9)
          assert round(bus.sense(0x0F), 2) == 3.6
          r = k.dehydrate([("keep", k.SYSTEM), ("noise "*50, k.TOOL)], half_life=6.0)
          assert r["reduction"] > 0.5 and r["kernel_latency_us"] >= 0
          print("kernel OK:", k.__version__, "| reduction", round(r["reduction"], 3))
          PY
      - name: Build the legacy kernel + run orchestrator tests (FINDINGS evidence)
        env:
          OMP_NUM_THREADS: "1"
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: |
          pip install ./bioma_kernel
          pip install httpx "openai>=1" python-dotenv pytest
          python -m pytest bioma_orchestrator/tests -q

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Proves the LEAN production image builds — the Rust/PyO3 micro-kernel stage
      # in a clean Linux container (no torch).
      - name: Build lean image (build stage)
        run: docker build -f deploy/Dockerfile.lean --target build -t bioma-micro:ci .
