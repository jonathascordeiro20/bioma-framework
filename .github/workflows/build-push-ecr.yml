name: build-push-ecr

# Builds the production image and pushes it to ECR via GitHub OIDC (no long-lived
# AWS keys). Trigger manually: `gh workflow run build-push-ecr.yml`.
on:
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ECR_REPO: bioma
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk (torch image is large)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO"
          docker build -t "$IMAGE:latest" -t "$IMAGE:${GITHUB_SHA::7}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA::7}"
          echo "### Pushed \`$IMAGE:latest\` (\`${GITHUB_SHA::7}\`)" >> "$GITHUB_STEP_SUMMARY"
