name: Deploy to AWS ECS

# Manual trigger by default (so it never fails before AWS is configured).
# After you finish the setup in DEPLOY_AWS_ECS.md, add a `push:` trigger to
# deploy automatically on every merge to main.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  id-token: write     # GitHub OIDC → assume the AWS role (no long-lived keys)
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: bioma
  ECS_CLUSTER: bioma-cluster
  ECS_SERVICE: bioma-service
  ECS_TASK_DEF: deploy/aws/task-definition.json
  CONTAINER_NAME: bioma

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
          docker build -t "$IMAGE" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Render task definition with the new image
        id: taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEF }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.taskdef.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
