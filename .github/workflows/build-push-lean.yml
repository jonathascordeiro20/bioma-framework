name: build-push-lean

# Builds the LEAN micro-kernel image (deploy/Dockerfile.lean — no torch) and
# pushes it to ECR as :latest via GitHub OIDC. Trigger: `gh workflow run build-push-lean.yml`.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ECR_REPO: bioma
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push (lean)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO"
          docker build -f deploy/Dockerfile.lean -t "$IMAGE:latest" -t "$IMAGE:lean-${GITHUB_SHA::7}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:lean-${GITHUB_SHA::7}"
          echo "### Pushed lean image \`$IMAGE:latest\` (\`lean-${GITHUB_SHA::7}\`)" >> "$GITHUB_STEP_SUMMARY"
