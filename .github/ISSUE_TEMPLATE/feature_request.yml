name: Feature request
description: Propose an improvement (kernel primitives need strong evidence — see CONTRIBUTING)
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real scenario hurts today? Numbers welcome.
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations: { required: true }
  - type: textarea
    id: measurement
    attributes:
      label: How would we measure it?
      description: This project only ships measured claims — sketch the harness that would prove the gain.
